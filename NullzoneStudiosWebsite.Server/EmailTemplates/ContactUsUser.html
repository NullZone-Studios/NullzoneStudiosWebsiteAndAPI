<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f0f0f;
        }

        .container {
            font-family: sans-serif;
            background: #0f0f0fff;
            color: aliceblue;
            padding: 1em;
            border: solid #5151c7 1px;
            border-radius: 15px;
        }

        .container * {
            padding: 0;
            margin: 0;
        }

        .container .card-body {
            display: flex;
            flex-direction: column;
            justify-content: start;
        }

        .container .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .container .header div {
            line-height: 2em;
        }

        .container .header img {
            height: 50px;
        }

        .container hr {
            background: linear-gradient(90deg, #00000000 0%, #ffffffa0 50%, #00000000 100%);
            height: 2px;
            border: none;
            margin: 1em 0em;
        }

        .container .info {
            line-height: 1.5em;
        }

        .container .info p {
            margin: 1em 0em;
        }

        .container .button {
            color: aliceblue;
            text-decoration: none;
            padding: 1em;
            margin: 1em 0em;
            background: linear-gradient(90deg, #2727c9 0%, #9f6f10 100%);
            border-radius: 10px;
            width: fit-content;
            display: inline-block;
        }

        .container .sent-by {
            text-align: center;
        }

        .container .sent-by img {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-body">
            <div class="header">
                <div>
                    <h1>Nullzone Studios</h1>
                </div>
                <img src="https://lh3.googleusercontent.com/pw/AP1GczOeC5Bhahd71egRg4EFwFKTmD1OLxsY4KyM5s3ARcAVyGRtM_v2DGQnFbFH7gSiK9Q6R4rYK35a0nuqZoTVTbtcyzOphB6pKttnonNCU2sfuyvTA5cuaSfCDctH-MWgmFBCETcWim4hfK8Rk9ngPIA=w512-h512-s-no" alt="Nullzone Studios Logo" />
            </div>
            <hr />
            <div class="info">
                <h2>Hello {{NAME}}!</h2>
                <p>We have received your message and will get back to you as soon as possible.</p>
                <p>Thank you for reaching out to us!</p>
            </div>
            <hr />
            <div class="sent-by">
                This email was sent by<br /><a href="https://nullzonestudios.com/"><img src="https://lh3.googleusercontent.com/pw/AP1GczMWyj4CYpm-4zZwctDcjor90l2Sx4KlxRnBEmUkNY999SSYWbYC6TdeVxGJbB30lQ6ogR2jp0WeBVu4iIHG7pMUZIv7y3bwBE3NWXldPntJ9XrRlR9otBEc-wSiSPAmNUVETjaSN6yUuHY9R9Qo2mg=w1243-h285-s-no" alt="NullZone Studios"></a>
            </div>
        </div>
    </div>
</body>

</html>
