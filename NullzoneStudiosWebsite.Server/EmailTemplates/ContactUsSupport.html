<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#0f0f0f;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#0f0f0f">
  <tr>
    <td align="center">

      <!-- Main Container -->
      <table width="100%" cellpadding="20" cellspacing="0" border="0" style="background-color:#0f0f0f; color:aliceblue; font-family:Arial, sans-serif; border:1px solid #5151c7; border-radius:15px;">
        
        <!-- Header -->
        <tr>
          <td>
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-size:28px; font-weight:bold; line-height:1.5;">
                  Nullzone Studios Website
                </td>
                <td align="right">
                  <img src="https://lh3.googleusercontent.com/pw/AP1GczOeC5Bhahd71egRg4EFwFKTmD1OLxsY4KyM5s3ARcAVyGRtM_v2DGQnFbFH7gSiK9Q6R4rYK35a0nuqZoTVTbtcyzOphB6pKttnonNCU2sfuyvTA5cuaSfCDctH-MWgmFBCETcWim4hfK8Rk9ngPIA=w512-h512-s-no"
                       alt="Nullzone Studios Logo"
                       width="60"
                       style="display:block;">
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Divider -->
        <tr>
          <td style="padding:0 20px;">
            <hr style="border:none; border-top:1px solid #aaaaaa;">
          </td>
        </tr>

        <!-- Content -->
        <tr>
          <td style="font-size:14px; line-height:1.6;">

            <p>A new contact form submission has been received:</p>

            <p><strong>Name:</strong> {{NAME}}</p>
            <p><strong>Email:</strong> {{EMAIL}}</p>
            <p><strong>Subject:</strong> {{SUBJECT}}</p>

            <p><strong>Message:</strong></p>
            <p style="white-space:pre-line;">{{MESSAGE}}</p>

            <p>Please respond to the user as soon as possible:</p>

            <!-- Button -->
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td bgcolor="#2727c9" style="border-radius:8px;">
                  <a href="mailto:{{EMAIL}}?subject=Re: {{SUBJECT}}"
                     style="display:inline-block; padding:12px 20px; color:#ffffff; text-decoration:none; font-size:14px;">
                    Respond
                  </a>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- Divider -->
        <tr>
          <td style="padding:0 20px;">
            <hr style="border:none; border-top:1px solid #aaaaaa;">
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="font-size:12px; color:#cccccc;">
            This email was sent by:<br><br>
            <a href="https://nullzonestudios.com/" style="text-decoration:none;">
              <img src="https://lh3.googleusercontent.com/pw/AP1GczMWyj4CYpm-4zZwctDcjor90l2Sx4KlxRnBEmUkNY999SSYWbYC6TdeVxGJbB30lQ6ogR2jp0WeBVu4iIHG7pMUZIv7y3bwBE3NWXldPntJ9XrRlR9otBEc-wSiSPAmNUVETjaSN6yUuHY9R9Qo2mg=w1243-h285-s-no"
                   alt="Nullzone Studios"
                   width="100%"
                   style="max-width:1000px; display:block;">
            </a>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>
